<svg id="default" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12"
  style="fill: var(--icon-secondary, transparent)">
  <defs>
    <style>
      .live-pulse {
        animation: livePulse 1.8s infinite;
      }

      @keyframes livePulse {
        0% { opacity: 0.8; transform: scale(1); }
        55% { opacity: 0.8; transform: scale(1); }
        70% { opacity: 0.4; transform: scale(4.5); }
        100% { opacity: 0; transform: scale(1); }
      }
    </style>
  </defs>
  <circle cx="6" cy="6" r="5.25" stroke="currentColor" stroke-width="1.5" />
  <circle cx="6" cy="6" r="1.5" fill="#C8102E" />
  <circle cx="6" cy="6" r="1" fill="#C8102E" class="live-pulse" transform-origin="50% 50%">
  </circle>
</svg>