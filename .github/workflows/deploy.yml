name: Build & Deploy to Mittwald

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build-storybook

      - name: Deploy Storybook
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.FTP_SERVER }}
          user: ${{ secrets.FTP_USERNAME }}
          pass: ${{ secrets.FTP_PASSWORD }}
          remoteDir: /storybook
          localDir: ./storybook-static
          options: --verbose --delete --overwrite
          settings: set sftp:auto-confirm yes
          protocol: sftp

      - name: Deploy Landing Page
        run: |
          sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.FTP_PASSWORD }}" sftp -oBatchMode=no -oStrictHostKeyChecking=no ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} <<EOF
          put public/index.html index.html
          bye
          EOF
