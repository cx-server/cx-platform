name: Build & Deploy to Mittwald

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via lftp
        run: |
          sudo apt-get install -y lftp
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" sftp://${{ secrets.FTP_SERVER }} <<EOF
          set sftp:auto-confirm yes
          set mirror:overwrite true
          mkdir -p /cx-platform
          rm -f /storybook/index.html
          mirror --reverse --overwrite --delete --verbose ./storybook-static /storybook
          put ./storybook-static/index.html -o /storybook/index.html
          put public/index.html -o /cx-platform/index.html
          bye
          EOF
